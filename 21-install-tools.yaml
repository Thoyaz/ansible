- name: Install Tools
  hosts: localhost
  connection: local
  become: yes
  vars:
    tools:
    - nginx
    - apache2
  
  tasks:
  - name: install tools
    ansible.builtin.package:
      name: "{{ item }}"
      state: present
    loop: "{{ tools }}"

  - name: start and enable tools 
    ansible.builtin.service:
      name: "{{ item }}"
      state: started
      enabled: yes
    loop: "{{ tools }}"
