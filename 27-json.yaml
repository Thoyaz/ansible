- name: demo on filters
  hosts: local
  connection: local
  tasks:
  - name: read students yaml
    ansible.builtin.set_fact:
      ubuntu_facts_yaml: "{{ lookup('file', 'ubuntufacts.yaml' ) | from_yaml }}"

  - name: convert YAML to JSON
    ansible.builtin.debug:
      msg: "{{ ubuntu_facts_yaml | to_nice_json  }}"
    register: ubuntu_facts_json

  - name: print JSON
    ansible.builtin.debug:
      msg: "{{ ubuntu_facts_yaml }}"


