- name: Read JSON using slurp and convert to variable
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Slurp JSON file
      ansible.builtin.slurp:
        src: ubuntu-facts.json
      register: json_file

    - name: Decode and convert JSON
      ansible.builtin.set_fact:
        my_data: "{{ json_file.content | b64decode | from_json }}"

    - name: Show parsed data
      debug:
        var: my_data