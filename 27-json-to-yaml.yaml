- name: Convert JSON to XML
  hosts: localhost
  connection: local

  tasks:
    - name: convert ubuntu facts json file to xml
      set_fact:
        xml_output: >-
          {{
            ansible.utils.to_xml(
              data=(lookup('file', 'ubuntu-facts.json') | from_json)
            )
          }}

    - name: Print XML
      debug:
        msg: "{{ xml_output }}"